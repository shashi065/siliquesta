version: '3.8'

# SILIQUESTA - Production Docker Compose
# Multi-service orchestration with health checks, networking, and monitoring

services:
  # ================================
  # PostgreSQL Database
  # ================================
  postgres:
    image: postgres:15-alpine
    container_name: siliquesta-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-siliquesta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:-siliquesta}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schemas/init.sql:/docker-entrypoint-initdb.d/001-init.sql
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siliquesta} -d ${POSTGRES_DB:-siliquesta}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - siliquesta-network
    labels:
      - "com.example.description=PostgreSQL Database"

  # ================================
  # Redis Cache & Queue
  # ================================
  redis:
    image: redis:7-alpine
    container_name: siliquesta-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?error}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - siliquesta-network
    labels:
      - "com.example.description=Redis Cache"

  # ================================
  # Backend API
  # ================================
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend.production
    container_name: siliquesta-backend-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-siliquesta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-siliquesta}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # AI Service
      AI_SERVICE_URL: http://ai-service:8000
      
      # JWT & Security
      JWT_SECRET: ${JWT_SECRET:?error}
      JWT_EXPIRY: 7d
      BCRYPT_ROUNDS: 10
      
      # Celery/Jobs
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_SERVICE_URL: ${LOG_SERVICE_URL:-}
      
      # CORS
      CORS_ORIGIN: ${BACKEND_CORS_ORIGIN:-https://app.siliquesta.com}
      
      # Port
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/services:/app/services:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - siliquesta-network
    labels:
      - "com.example.description=SILIQUESTA Backend API"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ================================
  # AI Service (ML Engine)
  # ================================
  ai-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.ai.production
    container_name: siliquesta-ai-prod
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKERS: 4
    ports:
      - "8000:8000"
    volumes:
      - ./ai-engine/models:/app/models:ro
      - ./ai-engine/datasets:/app/datasets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - siliquesta-network
    labels:
      - "com.example.description=SILIQUESTA AI Optimization Engine"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ================================
  # Frontend Web Server
  # ================================
  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend.production
    container_name: siliquesta-frontend-prod
    restart: unless-stopped
    depends_on:
      - backend
      - ai-service
    environment:
      BACKEND_URL: http://backend:5000/api/v1
      AI_SERVICE_URL: http://ai-service:8000
      NODE_ENV: production
    ports:
      - "3000:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - siliquesta-network
    labels:
      - "com.example.description=SILIQUESTA Frontend"

  # ================================
  # Monitoring: Prometheus
  # ================================
  prometheus:
    image: prom/prometheus:latest
    container_name: siliquesta-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - siliquesta-network
    labels:
      - "com.example.description=Prometheus Monitoring"

  # ================================
  # Monitoring: Grafana
  # ================================
  grafana:
    image: grafana/grafana:latest
    container_name: siliquesta-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?error}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3001}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - siliquesta-network
    labels:
      - "com.example.description=Grafana Dashboard"

  # ================================
  # Log Aggregation: Loki
  # ================================
  loki:
    image: grafana/loki:latest
    container_name: siliquesta-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./infra/monitoring/loki-config.yml:/etc/loki/local-config.yml:ro
    command: -config.file=/etc/loki/local-config.yml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - siliquesta-network
    labels:
      - "com.example.description=Loki Log Aggregation"

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

networks:
  siliquesta-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
