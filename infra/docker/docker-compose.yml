# Database - PostgreSQL
version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: siliquesta-db
    environment:
      POSTGRES_USER: siliquesta
      POSTGRES_PASSWORD: siliquesta
      POSTGRES_DB: siliquesta
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siliquesta"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: siliquesta-cache
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama LLM (Local AI)
  ollama:
    image: ollama/ollama:latest
    container_name: siliquesta-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_MODELS: /root/.ollama/models
    volumes:
      - ollama_data:/root/.ollama
    # Note: First run, execute: docker exec siliquesta-ollama ollama pull mistral

  # FastAPI Backend
  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: siliquesta-backend
    environment:
      DATABASE_URL: postgresql://siliquesta:siliquesta@postgres:5432/siliquesta
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OLLAMA_BASE_URL: http://ollama:11434
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: "false"
      APP_ENV: "production"
    ports:
      - "8100:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: siliquesta-worker
    command: celery -A app.celery_app worker --loglevel=INFO --concurrency=2
    environment:
      DATABASE_URL: postgresql://siliquesta:siliquesta@postgres:5432/siliquesta
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OLLAMA_BASE_URL: http://ollama:11434
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: "false"
      APP_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Product UI (standalone index.html)
  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.static
    container_name: siliquesta-app
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:

networks:
  default:
    name: siliquesta-network
