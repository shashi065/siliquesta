# Kubernetes Deployment - SILIQUESTA Backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: siliquesta-backend
  namespace: siliquesta
  labels:
    app: siliquesta
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: siliquesta
      component: backend
  template:
    metadata:
      labels:
        app: siliquesta
        component: backend
    spec:
      serviceAccountName: siliquesta
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: backend
        image: siliquesta/backend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: siliquesta-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: siliquesta-config
              key: redis-url
        - name: OLLAMA_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: siliquesta-config
              key: ollama-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: siliquesta-secrets
              key: secret-key
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: siliquesta-backend
  namespace: siliquesta
  labels:
    app: siliquesta
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: siliquesta
    component: backend
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: siliquesta-backend-hpa
  namespace: siliquesta
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: siliquesta-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
