apiVersion: apps/v1
kind: Deployment
metadata:
  name: siliquesta-frontend
  namespace: siliquesta
  labels:
    app: siliquesta
    component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: siliquesta
      component: frontend
  template:
    metadata:
      labels:
        app: siliquesta
        component: frontend
    spec:
      containers:
      - name: frontend
        image: siliquesta/frontend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.siliquesta.io/api/v1"
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: siliquesta-frontend
  namespace: siliquesta
  labels:
    app: siliquesta
    component: frontend
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: siliquesta
    component: frontend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: siliquesta-frontend-hpa
  namespace: siliquesta
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: siliquesta-frontend
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
