services:
  - type: web
    name: siliquesta-backend
    runtime: node
    plan: free
    rootDir: services/api
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: siliquesta-postgres
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: AI_URL
        fromService:
          type: pserv
          name: siliquesta-ai
          property: hostport

  - type: pserv
    name: siliquesta-ai
    runtime: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "10000"
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: siliquesta-postgres
    databaseName: siliquesta
    user: siliquesta
    plan: free
